name: Backend Pipeline (Test, Docker, Render)

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'backend/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      # 1. Check for errors in the backend code
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
        
      - name: Syntax Check
        working-directory: ./backend
        run: node -c server.js

      # 2. Build and Push Docker Image to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/resume-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/resume-backend:${{ github.sha }}
            
      # 3. Trigger Render Deployment automatically
      - name: Trigger Render Deployment
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set. Skipping Render deployment trigger."
          else
            echo "Triggering deployment to Render..."
            curl -X POST -d "" ${{ secrets.RENDER_DEPLOY_HOOK }}
            echo -e "\nRender deployment triggered successfully!"
          fi
