services:
  - type: web
    name: resume-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # You will add this manually in the Render Dashboard
      - key: CORS_ORIGINS
        sync: false # You will add this manually in the Render Dashboard
